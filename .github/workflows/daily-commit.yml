name: Daily Commit

on:
  schedule:
    - cron: '0 0 * * *'  # Every day at midnight UTC
  workflow_dispatch:      # Allow manual runs too

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Make 12 commits
        run: |
          git config user.name "Wajeeha"
          git config user.email "47328@students.riphah.edu.pk"
          
          for i in {1..12}; do
            echo "✅ Commit $i on $(date)" >> activity.log
            git add activity.log
            git commit -m "Auto commit $i"
          done

          git push
