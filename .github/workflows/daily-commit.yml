name: Daily Commit

on:
  schedule:
    - cron: '0 0 * * *'  # Every day at 12 AM UTC
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Make a daily commit
        run: |
          echo "✅ Commit on $(date)" >> activity.log
          git config user.name "Wajeeha Nadeem"
          git config user.email "47328@students.riphah.edu.pk"
          git add activity.log
          git commit -m "Daily activity update" || echo "Nothing to commit"
          git push

